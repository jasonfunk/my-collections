appId: com.mycollections.app
---
# Assumes dashboard is the active screen (post-login, post-navigation/tabs).

# ── Star Wars item detail ─────────────────────────────────────────────────────

- tapOn:
    text: "Star Wars"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "2 items"
    timeout: 20000

- tapOn: "2-1B / Two-Onebee"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Condition"
    timeout: 10000

- assertVisible: "Catalog Info"
- assertVisible: "Empire Strikes Back (1980–82)"
- assertVisible: "1981"
- assertVisible: "Condition"
- scrollUntilVisible:
    element:
      text: "Details"
    direction: DOWN
    timeout: 5000
- assertVisible: "Details"

- pressKey: Back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "2 items"
    timeout: 10000

- tapOn: "Dashboard"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000

