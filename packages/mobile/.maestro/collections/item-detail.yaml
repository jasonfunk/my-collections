appId: com.mycollections.app
---
# Assumes dashboard is the active screen (post-login, post-navigation/tabs).

# ── Star Wars item detail ─────────────────────────────────────────────────────

- tapOn:
    text: "Star Wars"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "2 items"
    timeout: 20000

- tapOn: "2-1B / Two-Onebee"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Condition"
    timeout: 10000

- assertVisible: "Condition"
- assertVisible: "Details"

- pressKey: Back
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "2 items"
    timeout: 10000

- tapOn: "Dashboard"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000

# ── Transformers item detail (Catalog Info section) ───────────────────────────

- tapOn:
    text: "Transformers"
    index: 0
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "2 items"
    timeout: 20000

- tapOn: "Afterburner"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Catalog Info"
    timeout: 10000

- assertVisible: "Catalog Info"
- assertVisible: "Technobot"
- assertVisible: "Cybertronic motorcycle"
- assertVisible: "Condition"
- assertVisible: "Details"

- pressKey: Back
- waitForAnimationToEnd

- tapOn: "Dashboard"
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 10000
