appId: com.mycollections.app
---
- clearState
- launchApp

# AuthProvider checks SecureStore before redirecting — wait for login screen to appear
- extendedWaitUntil:
    visible: "My Collections"
    timeout: 10000
- assertVisible: "Sign in to your collection"

- tapOn: "Email"
- inputText: "collector@example.com"
- tapOn: "Password"
- inputText: "correct-horse-battery"
- hideKeyboard
- tapOn: "Sign In"

# Header + Sign Out only render after the loading spinner clears (stats + recent fetched).
# Cold start (clearState + PKCE 5-call OAuth flow + 2 dashboard API calls) needs ~30s.
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 30000
- assertVisible: "My Collections"
- assertVisible: "Dashboard"
