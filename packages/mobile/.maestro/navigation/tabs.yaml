appId: com.mycollections.app
---
# The dashboard has a "Collections" section label (raw text same as the tab bar label).
# Use index: 1 to skip the section label (index 0) and tap the tab bar item.
# Collections tab may show the browse screen if already navigated there
- tapOn:
    text: "Collections"
    index: 1
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Star Wars"
    timeout: 10000

# Wishlist tab has testID="tab-wishlist" to avoid ambiguity with "Wishlist" status badges on dashboard rows
- tapOn:
    id: "tab-wishlist"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Wishlist"
    timeout: 5000

- tapOn: "Search"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Type to search across all collections"
    timeout: 5000

- tapOn: "Dashboard"
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: "Sign Out"
    timeout: 5000
- assertVisible: "My Collections"
