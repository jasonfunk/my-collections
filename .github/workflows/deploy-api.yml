name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
  workflow_dispatch:

concurrency:
  group: deploy-api
  # Do not cancel in-progress deploys — a mid-deploy cancellation (e.g. after
  # migrations run but before pm2 restarts) leaves the API in a broken state.
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Mac Mini
    runs-on: self-hosted
    environment: production
    steps:
      - name: Pull latest code
        run: git -C ~/Sites/my-collections pull origin main

      - name: Install dependencies
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections && npm ci

      - name: Build
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections && npm run build -- --filter=@my-collections/api

      - name: Run migrations
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections/packages/api && npm run migration:run

      - name: Restart API
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections && pm2 startOrReload ecosystem.config.js --only my-collections-api && pm2 save
