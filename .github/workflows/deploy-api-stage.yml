name: Deploy API (Staging)

on:
  push:
    branches: [develop]
    paths:
      - 'packages/api/**'
      - 'packages/shared/**'
  workflow_dispatch:

concurrency:
  group: deploy-api-stage
  # Do not cancel in-progress deploys — a mid-deploy cancellation (e.g. after
  # migrations run but before pm2 restarts) leaves the API in a broken state.
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Mac Mini (staging)
    runs-on: self-hosted
    environment: staging
    steps:
      - name: Pull latest code
        run: git -C ~/Sites/my-collections-stage pull origin develop

      - name: Install dependencies
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections-stage && npm ci

      - name: Build
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections-stage && npm run build -- --filter=@my-collections/api

      - name: Run migrations
        run: . $HOME/.nvm/nvm.sh && cd ~/Sites/my-collections-stage/packages/api && npm run migration:run

      - name: Restart API
        run: . $HOME/.nvm/nvm.sh && pm2 restart my-collections-api-stage
