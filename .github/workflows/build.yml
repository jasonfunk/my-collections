name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
        # Build all packages except mobile. expo export requires Metro bundler and native
        # tooling unavailable in CI. Mobile TypeScript is already type-checked in the
        # lint job (tsc --noEmit). The mobile package is an Expo 51 scaffold — full
        # build verification comes when upgrading to Expo 55 before production.
      - run: npm run build -- --filter=!@my-collections/mobile
